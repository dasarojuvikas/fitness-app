server:
  port: 8081

spring:
  application:
    name: user-service

  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:postgresql://postgres:5432/fitness_user_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/